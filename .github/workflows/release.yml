name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # needed by softprops/action-gh-release

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: windows, goarch: amd64, ext: .exe }
          - { goos: linux,   goarch: amd64, ext: ''   }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build
        env:
          GOOS:   ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OUT="sspt-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -trimpath -ldflags "-s -w -X main.Version=${VERSION}" -o "${OUT}" ./cmd/sspt
          sha256sum "${OUT}" > "${OUT}.sha256"
          ls -la "${OUT}" "${OUT}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: sspt-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            sspt-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
            sspt-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Aggregate checksums
        run: |
          cd dist
          cat *.sha256 > SHA256SUMS
          rm -f *.sha256
          cat SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sspt-*
            dist/SHA256SUMS
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
